services:
  # Frontend Static Site for CEO Admin App
  - type: static
    name: ceo-admin-app
    env: static
    plan: free
    region: ohio
    buildCommand: npm install && npm run build
    publishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: max-age=31536000
    routes:
